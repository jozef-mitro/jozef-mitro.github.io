<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>RPG Tools</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/mvp.css">
    <link rel="stylesheet" href="css/theme.css">
    <script type="module" src="js/rpg.js"></script>
</head>

<body>
    <header>
        <nav>
            <h1>RPG Tools</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="rpg.html">RPG Tools</a></li>
            </ul>
        </nav>
    </header>
    <hr>
    <main>
        <form id="characterGeneratorForm">
            <h2>OSE Character Generator</h2>
            <label for="numCharacters">Number of Characters:</label>
            <input type="number" id="numCharacters" value="4" min="1" max="20">
            <label for="minScoreTotal">Minimum Total Score:</label>
            <input type="number" id="minScoreTotal" value="50" min="18" max="108">
            <!-- Checkbox -->
            <label>Allowed Sources:</label>
            <span>
                <input type="checkbox" id="sourceClassicFantasy" checked>
                Classic Fantasy
                <input type="checkbox" id="sourceAdvancedFantasy" checked>
                Advanced Fantasy
                <input type="checkbox" id="sourceCarcassCrawler" checked>
                Carcass Crawler
                <input type="checkbox" id="sourceTheNecromancer" checked>
                The Necromancer
            </span>
            <br>
            <div class="button-row">
                <button type="submit">Generate Characters</button>
                <button type="button" id="copyCharacters" disabled>Save to Clipboard</button>
            </div>
            <output id="copyCharactersStatus" class="inline-status" aria-live="polite"></output>
            <div class="table-wrapper">
                <div id="characters"></div>
            </div>
        </form>
        <form id="nameGeneratorForm">
            <h2>Name Generator</h2>
            <label for="nameType">Type:</label>
            <select id="nameType">
                <option>Masculine</option>
                <option>Feminine</option>
                <option>Either</option>
            </select>
            <label for="numNames">Number:</label>
            <input type="number" id="numNames" value="10" min="1" max="20">
            <div class="button-row">
                <button type="submit">Generate Names</button>
                <button type="button" id="copyNames" disabled>Save to Clipboard</button>
            </div>
            <output id="copyNamesStatus" class="inline-status" aria-live="polite"></output>
            <div class="table-wrapper">
                <div id="names"></div>
            </div>
        </form>
    </main>
</body>

</html>
